<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Records</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

body{
    background:#f5f5f5;
}

.card{
    transition:0.3s;
    border:none;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0px 10px 20px rgba(0,0,0,.2);
}

.student-img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #0d6efd;
}

</style>

</head>
<body>

<div class="container py-5">

<h2 class="text-center mb-4">
Student Records
</h2>

<input
type="text"
id="search"
class="form-control mb-4"
placeholder="Search Student..."
>

<div class="row" id="container">

</div>

</div>

<script>

const students=[

{
name:"Harshvardhan Singh Rathore",
branch:"CSE",
cgpa:"9.3",

},

{
name:"Ishan Jain",
branch:"CSE",
cgpa:"10.0",

},

{
name:"Himanshu Jyani",
branch:"CSE",
cgpa:"9.0",

},



{
name:"Jatin Jangir",
branch:"CSE",
cgpa:"9.0",

},

{
name:"Dharmik jain",
branch:"CSE",
cgpa:"9.0",

},

{
name:"Himanshu Yadav",
branch:"CSE",
cgpa:"9.0",

}

];

function displayStudents(list){

let html="";

list.forEach((student,index)=>{

html+=`

<div class="col-md-4 mb-4 student-card">

<div class="card p-3 shadow text-center">

<img src="${student.photo}" class="student-img mx-auto">

<h5 class="mt-3">${student.name}</h5>

<button
class="btn btn-primary btn-sm mt-2 showBtn"
data-id="${index}">
Show Details
</button>

<div class="details mt-3" style="display:none;">

<p><strong>Branch :</strong> ${student.branch}</p>

<p><strong>CGPA :</strong> ${student.cgpa}</p>

</div>

</div>

</div>

`;

});

$("#container").html(html);

}

displayStudents(students);

$(document).on("click",".showBtn",function(){

$(this).next(".details").slideToggle();

if($(this).text()=="Show Details"){
$(this).text("Hide Details");
}
else{
$(this).text("Show Details");
}

});

$("#search").on("keyup",function(){

let value=$(this).val().toLowerCase();

$(".student-card").filter(function(){

$(this).toggle($(this).text().toLowerCase().indexOf(value)>-1);

});

});

</script>

</body>
</html>
